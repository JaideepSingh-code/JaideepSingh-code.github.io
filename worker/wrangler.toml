name = "jaideep-portfolio-bot"
main = "bot-worker.js"
compatibility_date = "2024-11-01"

# Serve the worker on a branded custom domain (zone already on this Cloudflare
# account). Wrangler auto-provisions the DNS record + TLS cert.
[[routes]]
pattern = "bot.jaideepsingh.dev"
custom_domain = true

# Per-IP rate limit (Cloudflare native, free). 20 requests / 60s.
# period must be 10 or 60. Worker fails open if this binding is absent.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1101"
simple = { limit = 15, period = 60 }

# --- ElevenLabs voice clone (optional; /tts no-ops until configured) ---
# 1. Clone your voice at elevenlabs.io, copy the Voice ID into ELEVEN_VOICE_ID below.
# 2. wrangler secret put ELEVEN_API_KEY    # paste your ElevenLabs API key
# 3. wrangler deploy
[vars]
ELEVEN_VOICE_ID = ""
ELEVEN_MODEL = "eleven_turbo_v2_5"

# Deploy:
#   cd worker
#   npm i -g wrangler
#   wrangler login
#   wrangler deploy
#   wrangler secret put GEMINI_API_KEY      # paste your Google Gemini key when prompted
#
# Then copy the printed URL (https://jaideep-portfolio-bot.<you>.workers.dev) and add this
# line to index.html, just BEFORE <script src="script.js"></script>:
#   <script>window.JAIDEEP_BOT_ENDPOINT = 'https://jaideep-portfolio-bot.<you>.workers.dev';</script>

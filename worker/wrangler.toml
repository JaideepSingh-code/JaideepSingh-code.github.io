name = "jaideep-portfolio-bot"
main = "bot-worker.js"
compatibility_date = "2024-11-01"

# Serve the worker on a branded custom domain (zone already on this Cloudflare
# account). Wrangler auto-provisions the DNS record + TLS cert.
[[routes]]
pattern = "bot.jaideepsingh.dev"
custom_domain = true

# Deploy:
#   cd worker
#   npm i -g wrangler
#   wrangler login
#   wrangler deploy
#   wrangler secret put GEMINI_API_KEY      # paste your Google Gemini key when prompted
#
# Then copy the printed URL (https://jaideep-portfolio-bot.<you>.workers.dev) and add this
# line to index.html, just BEFORE <script src="script.js"></script>:
#   <script>window.JAIDEEP_BOT_ENDPOINT = 'https://jaideep-portfolio-bot.<you>.workers.dev';</script>
